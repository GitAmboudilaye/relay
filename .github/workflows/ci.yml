name: RELAY CI

# Protège le moteur canonique : une PR ne doit ni casser les scripts, ni glisser une
# identité de projet dans le moteur, ni produire un bootstrap invalide.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. ShellCheck — les ERREURS bloquent (warnings/style tolérés pour l'instant).
      #    Couvre le noyau (scripts), le bootstrap (bin) ET les adaptateurs harnais (engine/adapters).
      - name: ShellCheck (severity=error)
        run: shellcheck --severity=error engine/scripts/*.sh bin/*.sh engine/adapters/*/*.sh

      # 2. Pureté du moteur — aucune identité de projet en dur (principe anti-drift).
      - name: Engine purity (no project identity hardcoded)
        run: |
          if grep -rniE 'agriconnect|tempow|deepmanag' engine/ bin/; then
            echo "::error::Identité de projet en dur dans le moteur — un fichier engine/ ou bin/ ne doit contenir AUCUNE donnée de projet."
            exit 1
          fi
          echo "✅ moteur project-agnostic"

      # 3. Smoke test — bootstrap un projet jetable puis valide qu'il tourne.
      - name: Smoke test (relay-init bootstrap + relay-check)
        run: |
          set -euo pipefail
          FIX="$(mktemp -d)"
          cd "$FIX"
          git init -q
          git config user.email ci@relay.test
          git config user.name "RELAY CI"
          "$GITHUB_WORKSPACE/bin/relay-init.sh" \
            --project-name CITest --stack "Node+Express" --lang "JS" \
            --domain "todo" --actors "user,admin" --llm generic
          # relay-check doit s'exécuter et produire un Health Score (sans --strict → exit 0 attendu).
          ./docs/scripts/relay-check.sh > out.txt 2>&1 || true
          grep -q "Health Score" out.txt || { echo "::error::relay-check n'a pas produit de Health Score"; cat out.txt; exit 1; }
          # Aucun placeholder {{...}} ne doit subsister après le bootstrap.
          if grep -rl '{{' . --include='*.md' | grep -v out.txt; then
            echo "::error::placeholder {{...}} non substitué après relay-init"; exit 1
          fi
          # SEC-3 : relay-init doit déposer le workflow CI RELAY, et ce doit être un YAML valide.
          WF=".github/workflows/relay-ci.yml"
          [ -f "$WF" ] || { echo "::error::$WF absent après relay-init (SEC-3)"; exit 1; }
          python3 -c "import yaml,sys; yaml.safe_load(open('$WF'))" \
            || { echo "::error::$WF n'est pas un YAML valide"; exit 1; }
          grep -q 'relay-check.sh --strict' "$WF" || { echo "::error::$WF ne lance pas relay-check --strict"; exit 1; }
          grep -q 'gitleaks' "$WF"                 || { echo "::error::$WF ne lance pas gitleaks"; exit 1; }
          # SEC-2 : relay-init doit déposer la checklist SECURITY_RULES.md (ancrage sélectif, Couche 2)
          # et la section [security_surface] doit être présente dans rules.conf (marqueurs de surface).
          [ -f docs/rules/SECURITY_RULES.md ] || { echo "::error::docs/rules/SECURITY_RULES.md absent après relay-init (SEC-2)"; exit 1; }
          grep -qE '^\[security_surface\]' docs/.relay/rules.conf \
            || { echo "::error::section [security_surface] absente de rules.conf (SEC-2)"; exit 1; }
          # SEC-4 : le moteur propagé porte le Security Pattern Memory (§9c, auto-feed SECURITY_RULES.md).
          grep -q 'Security Pattern Memory' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §9c Security Pattern Memory (SEC-4)"; exit 1; }
          # SCOPE-1 : le moteur propagé porte le Scope-Creep Alert (§10, mécanise la règle 70%).
          grep -q 'Scope-Creep Alert' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §10 Scope-Creep Alert (SCOPE-1)"; exit 1; }
          # DECISION-TRIGGER : le moteur propagé porte le Decision Trigger (§11, trace des décisions archi),
          # et la section [decision_surface] doit être présente dans rules.conf (marqueurs structurels).
          grep -q 'Decision Trigger' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §11 Decision Trigger (DECISION-TRIGGER)"; exit 1; }
          grep -qE '^\[decision_surface\]' docs/.relay/rules.conf \
            || { echo "::error::section [decision_surface] absente de rules.conf (DECISION-TRIGGER)"; exit 1; }
          # QUAL-1 : le moteur propagé porte le Regression Pattern Memory (§12, Regression Shield auto-alimenté),
          # et la section [regression_warn] doit être présente dans rules.conf (tier WARNING des patterns appris).
          grep -q 'Regression Pattern Memory' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §12 Regression Pattern Memory (QUAL-1)"; exit 1; }
          grep -qE '^\[regression_warn\]' docs/.relay/rules.conf \
            || { echo "::error::section [regression_warn] absente de rules.conf (QUAL-1)"; exit 1; }
          # RELAY-FORECAST : le moteur propagé porte l'outil de projection de fin de backlog (pair de relay-stats),
          # et il doit être informatif pur (exit 0 toujours — jamais un gate).
          [ -x docs/scripts/relay-forecast.sh ] \
            || { echo "::error::docs/scripts/relay-forecast.sh absent/non exécutable après relay-init (RELAY-FORECAST)"; exit 1; }
          ./docs/scripts/relay-forecast.sh --json > /dev/null \
            || { echo "::error::relay-forecast.sh n'est pas exit-0 (doit être informatif pur, jamais un gate)"; exit 1; }
          # RELAY-1 (Core actif) : le noyau de scan ciblé est propagé, informatif pur (exit 0), sortie --json.
          [ -x docs/scripts/relay-scan.sh ] \
            || { echo "::error::docs/scripts/relay-scan.sh absent/non exécutable après relay-init (RELAY-1)"; exit 1; }
          ./docs/scripts/relay-scan.sh "relay" --json > /dev/null \
            || { echo "::error::relay-scan.sh n'est pas exit-0 (doit être informatif pur, jamais un gate)"; exit 1; }
          # RELAY-2 (Core actif) : le noyau de contexte par-chemin est propagé, informatif pur (exit 0), sortie --json.
          [ -x docs/scripts/relay-context.sh ] \
            || { echo "::error::docs/scripts/relay-context.sh absent/non exécutable après relay-init (RELAY-2)"; exit 1; }
          ./docs/scripts/relay-context.sh --path=README.md --json > /dev/null \
            || { echo "::error::relay-context.sh n'est pas exit-0 (doit être informatif pur, jamais un gate)"; exit 1; }
          # RELAY-3 (Core actif) : l'adaptateur hook PreToolUse Claude Code est propagé + exécutable, et
          # FAIL-OPEN (toujours exit 0 ; ici contenu propre → silence = aucune sortie, jamais bloquant).
          [ -x docs/adapters/claude-code/relay-hook.sh ] \
            || { echo "::error::docs/adapters/claude-code/relay-hook.sh absent/non exécutable après relay-init (RELAY-3)"; exit 1; }
          printf '%s' '{"tool_name":"Write","tool_input":{"file_path":"README.md","content":"hello world"}}' \
            | RELAY_CONTEXT_BIN="$PWD/docs/scripts/relay-context.sh" docs/adapters/claude-code/relay-hook.sh > /dev/null \
            || { echo "::error::relay-hook.sh n'est pas exit-0 (l'adaptateur DOIT toujours fail-open)"; exit 1; }
          # RELAY-CLINE (Core actif) : le 2ᵉ adaptateur (hook PreToolUse Cline) est propagé + exécutable,
          # FAIL-OPEN (toujours exit 0), et renvoie un ALLOW explicite {"cancel": false} (contrat Cline ≠
          # silence) sur un contenu propre — jamais bloquant par défaut.
          [ -x docs/adapters/cline/relay-precheck.sh ] \
            || { echo "::error::docs/adapters/cline/relay-precheck.sh absent/non exécutable après relay-init (RELAY-CLINE)"; exit 1; }
          CLINE_OUT="$(printf '%s' '{"toolName":"write_to_file","parameters":{"path":"README.md","content":"hello world"}}' \
            | RELAY_CONTEXT_BIN="$PWD/docs/scripts/relay-context.sh" docs/adapters/cline/relay-precheck.sh)" \
            || { echo "::error::relay-precheck.sh n'est pas exit-0 (l'adaptateur DOIT toujours fail-open)"; exit 1; }
          printf '%s' "$CLINE_OUT" | grep -q '"cancel": false' \
            || { echo "::error::relay-precheck.sh doit renvoyer un ALLOW explicite {\"cancel\": false} sur contenu propre (contrat Cline)"; exit 1; }
          # RELAY-TOKENS (Core actif « + ») : la métrique token-saved est propagée, informative pure (exit 0),
          # sortie --json, et HONNÊTE sans ledger (firings=0, jamais un chiffre inventé).
          [ -x docs/scripts/relay-tokens.sh ] \
            || { echo "::error::docs/scripts/relay-tokens.sh absent/non exécutable après relay-init (RELAY-TOKENS)"; exit 1; }
          ./docs/scripts/relay-tokens.sh --json > /dev/null \
            || { echo "::error::relay-tokens.sh n'est pas exit-0 (doit être informatif pur, jamais un gate)"; exit 1; }
          ./docs/scripts/relay-tokens.sh --json | grep -q '"firings": 0' \
            || { echo "::error::relay-tokens.sh doit afficher firings=0 sans ledger (pas de chiffre inventé)"; exit 1; }
          # RELAY-NOAGENT (Core actif) : le 3ᵉ adaptateur (git pre-commit / CI, scénario SANS agent) est
          # propagé + exécutable, et applique la sémantique fail-OPEN outillage / fail-CLOSED finding :
          #   (a) un contenu stagé PROPRE → exit 0 (ne bloque jamais à tort) ;
          #   (b) un pattern PROSCRIT stagé → exit 1 (BLOQUE — c'est tout l'intérêt du canal dégradé).
          [ -x docs/adapters/no-agent/relay-precommit.sh ] \
            || { echo "::error::docs/adapters/no-agent/relay-precommit.sh absent/non exécutable après relay-init (RELAY-NOAGENT)"; exit 1; }
          printf 'public class Ok { void M(){} }\n' > Clean.cs && git add Clean.cs
          RELAY_CONTEXT_BIN="$PWD/docs/scripts/relay-context.sh" docs/adapters/no-agent/relay-precommit.sh \
            || { echo "::error::relay-precommit.sh doit exit-0 sur un contenu stagé propre (fail-open)"; exit 1; }
          git rm -q --cached Clean.cs && rm -f Clean.cs
          # [security_forbidden] est ACTIF par défaut dans le rules.conf du template (AKIA…, clé privée) —
          # ERROR quasi-zéro-faux-positif. On stage un fichier de code avec une clé AWS littérale et on
          # exige exit 1 (le canal dégradé DOIT bloquer un secret commité).
          printf 'const k = "AKIAIOSFODNN7EXAMPLE";\n' > leak.js && git add leak.js
          if RELAY_CONTEXT_BIN="$PWD/docs/scripts/relay-context.sh" docs/adapters/no-agent/relay-precommit.sh; then
            echo "::error::relay-precommit.sh doit exit-1 (BLOQUER) sur un pattern PROSCRIT stagé (fail-closed sur finding)"; exit 1
          fi
          git rm -q --cached leak.js && rm -f leak.js
          echo "✅ bootstrap + relay-check + CI (SEC-3) + ancrage sélectif (SEC-2) + pattern memory (SEC-4) + scope-creep (SCOPE-1) + decision-trigger (§11) + regression-pattern-memory (§12) + forecast (RELAY-FORECAST) + scan (RELAY-1) + context (RELAY-2) + hook-adapter (RELAY-3) + cline-adapter (RELAY-CLINE) + tokens (RELAY-TOKENS) + noagent-adapter (RELAY-NOAGENT) OK"
