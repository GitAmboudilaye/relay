name: RELAY CI

# Protège le moteur canonique : une PR ne doit ni casser les scripts, ni glisser une
# identité de projet dans le moteur, ni produire un bootstrap invalide.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. ShellCheck — les ERREURS bloquent (warnings/style tolérés pour l'instant).
      - name: ShellCheck (severity=error)
        run: shellcheck --severity=error engine/scripts/*.sh bin/*.sh

      # 2. Pureté du moteur — aucune identité de projet en dur (principe anti-drift).
      - name: Engine purity (no project identity hardcoded)
        run: |
          if grep -rniE 'agriconnect|tempow|deepmanag' engine/ bin/; then
            echo "::error::Identité de projet en dur dans le moteur — un fichier engine/ ou bin/ ne doit contenir AUCUNE donnée de projet."
            exit 1
          fi
          echo "✅ moteur project-agnostic"

      # 3. Smoke test — bootstrap un projet jetable puis valide qu'il tourne.
      - name: Smoke test (relay-init bootstrap + relay-check)
        run: |
          set -euo pipefail
          FIX="$(mktemp -d)"
          cd "$FIX"
          git init -q
          git config user.email ci@relay.test
          git config user.name "RELAY CI"
          "$GITHUB_WORKSPACE/bin/relay-init.sh" \
            --project-name CITest --stack "Node+Express" --lang "JS" \
            --domain "todo" --actors "user,admin" --llm generic
          # relay-check doit s'exécuter et produire un Health Score (sans --strict → exit 0 attendu).
          ./docs/scripts/relay-check.sh > out.txt 2>&1 || true
          grep -q "Health Score" out.txt || { echo "::error::relay-check n'a pas produit de Health Score"; cat out.txt; exit 1; }
          # Aucun placeholder {{...}} ne doit subsister après le bootstrap.
          if grep -rl '{{' . --include='*.md' | grep -v out.txt; then
            echo "::error::placeholder {{...}} non substitué après relay-init"; exit 1
          fi
          # SEC-3 : relay-init doit déposer le workflow CI RELAY, et ce doit être un YAML valide.
          WF=".github/workflows/relay-ci.yml"
          [ -f "$WF" ] || { echo "::error::$WF absent après relay-init (SEC-3)"; exit 1; }
          python3 -c "import yaml,sys; yaml.safe_load(open('$WF'))" \
            || { echo "::error::$WF n'est pas un YAML valide"; exit 1; }
          grep -q 'relay-check.sh --strict' "$WF" || { echo "::error::$WF ne lance pas relay-check --strict"; exit 1; }
          grep -q 'gitleaks' "$WF"                 || { echo "::error::$WF ne lance pas gitleaks"; exit 1; }
          # SEC-2 : relay-init doit déposer la checklist SECURITY_RULES.md (ancrage sélectif, Couche 2)
          # et la section [security_surface] doit être présente dans rules.conf (marqueurs de surface).
          [ -f docs/rules/SECURITY_RULES.md ] || { echo "::error::docs/rules/SECURITY_RULES.md absent après relay-init (SEC-2)"; exit 1; }
          grep -qE '^\[security_surface\]' docs/.relay/rules.conf \
            || { echo "::error::section [security_surface] absente de rules.conf (SEC-2)"; exit 1; }
          # SEC-4 : le moteur propagé porte le Security Pattern Memory (§9c, auto-feed SECURITY_RULES.md).
          grep -q 'Security Pattern Memory' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §9c Security Pattern Memory (SEC-4)"; exit 1; }
          # SCOPE-1 : le moteur propagé porte le Scope-Creep Alert (§10, mécanise la règle 70%).
          grep -q 'Scope-Creep Alert' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §10 Scope-Creep Alert (SCOPE-1)"; exit 1; }
          # DECISION-TRIGGER : le moteur propagé porte le Decision Trigger (§11, trace des décisions archi),
          # et la section [decision_surface] doit être présente dans rules.conf (marqueurs structurels).
          grep -q 'Decision Trigger' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §11 Decision Trigger (DECISION-TRIGGER)"; exit 1; }
          grep -qE '^\[decision_surface\]' docs/.relay/rules.conf \
            || { echo "::error::section [decision_surface] absente de rules.conf (DECISION-TRIGGER)"; exit 1; }
          # QUAL-1 : le moteur propagé porte le Regression Pattern Memory (§12, Regression Shield auto-alimenté),
          # et la section [regression_warn] doit être présente dans rules.conf (tier WARNING des patterns appris).
          grep -q 'Regression Pattern Memory' docs/scripts/relay-check.sh \
            || { echo "::error::relay-check.sh propagé ne porte pas §12 Regression Pattern Memory (QUAL-1)"; exit 1; }
          grep -qE '^\[regression_warn\]' docs/.relay/rules.conf \
            || { echo "::error::section [regression_warn] absente de rules.conf (QUAL-1)"; exit 1; }
          # RELAY-FORECAST : le moteur propagé porte l'outil de projection de fin de backlog (pair de relay-stats),
          # et il doit être informatif pur (exit 0 toujours — jamais un gate).
          [ -x docs/scripts/relay-forecast.sh ] \
            || { echo "::error::docs/scripts/relay-forecast.sh absent/non exécutable après relay-init (RELAY-FORECAST)"; exit 1; }
          ./docs/scripts/relay-forecast.sh --json > /dev/null \
            || { echo "::error::relay-forecast.sh n'est pas exit-0 (doit être informatif pur, jamais un gate)"; exit 1; }
          echo "✅ bootstrap + relay-check + CI (SEC-3) + ancrage sélectif (SEC-2) + pattern memory (SEC-4) + scope-creep (SCOPE-1) + decision-trigger (§11) + regression-pattern-memory (§12) + forecast (RELAY-FORECAST) OK"
