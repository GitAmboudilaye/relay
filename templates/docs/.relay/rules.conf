# RELAY — règles d'instance du Regression Shield
# ─────────────────────────────────────────────────────────────────────────────
# Fichier d'INSTANCE : versionné (committé), JAMAIS écrasé par relay-update.
# Déclarez ici les patterns que CE projet ne doit jamais réintroduire dans un diff.
#
# Format :
#   • Une regex (ERE, telle que `grep -E`) par ligne, sous [forbidden_patterns].
#   • Exclusion optionnelle inline :  <regex> | exclude=<regex-d-exclusion>
#     (la ligne stagée correspondant à l'exclusion n'est PAS comptée comme violation).
#   • Lignes vides et lignes commençant par « # » : ignorées.
#
# Tant qu'aucun pattern n'est déclaré (section vide), le Regression Shield reste
# INACTIF et relay-check l'annonce par un avertissement explicite à chaque commit.
# Adaptez les exemples ci-dessous à VOTRE stack, puis décommentez-les.

[forbidden_patterns]
# ── Exemples (décommenter + adapter) ────────────────────────────────────────
# \.Result\b              | exclude=\.Result[[:space:]]*=   # .NET : .Result bloquant (deadlock async), sauf l'affectation MVC `context.Result = ...`
# \.Wait\(\)                                                # .NET : .Wait() bloquant
# localhost:[0-9]+                                          # URL/port codé en dur
# console\.log                                              # JS/TS : log de debug oublié
# TODO|FIXME                                                # marqueurs à ne pas committer

# ─────────────────────────────────────────────────────────────────────────────
# Design System Shield (sévérité WARNING — ne bloque pas le commit).
# Vérifie que les fichiers stagés utilisent le design system du projet plutôt que
# des valeurs codées en dur. Sections par type de fichier :
#   • [design_warn_flutter] → fichiers .dart
#   • [design_warn_css]     → fichiers .css / .cshtml
# Format : <regex> | msg=<texte de remédiation> | exclude-path=<fragment-de-chemin>
#   (msg & exclude-path optionnels ; exclude-path = fichiers dont le chemin contient
#    ce fragment sont ignorés, p.ex. l'emplacement où le design system est DÉFINI).
# Section absente/vide → shield DS inactif pour ce type (annoncé, jamais muet).

[design_warn_flutter]
# ── Exemples (décommenter + adapter à VOTRE design system) ───────────────────
# Colors\.green\b   | msg=utiliser AppColors.* à la place | exclude-path=core/theme/
# Colors\.red\b     | msg=utiliser AppColors.* à la place | exclude-path=core/theme/

[design_warn_css]
# ── Exemple (décommenter + adapter) ─────────────────────────────────────────
# (color|background|border)[^:]*:[^;]*#[0-9a-fA-F]{3,6}   | msg=couleur hex hardcodée — utiliser var(--ac-*) | exclude-path=design-system

# ─────────────────────────────────────────────────────────────────────────────
# Security Shield — patterns de sécurité dangereux dans le diff stagé (code ET config).
# Deux sections, deux sévérités :
#   • [security_forbidden] → ERREUR (bloque le commit) — patterns à quasi-zéro faux positif
#   • [security_warn]      → WARNING (ne bloque pas)    — heuristiques utiles mais bruitées
# Format : <regex ERE, grep -E> | msg=<remédiation> | exclude=<regex contenu> | exclude-path=<fragment chemin>
#   (tous les champs après le 1er « | » sont optionnels ; ordre libre ; séparateur = « espace|espace »).
# Section absente/vide → Shield inactif pour cette sévérité, ANNONCÉ (jamais muet).
# Le MOTEUR ne fournit que le mécanisme ; les patterns vivent ici (instance, 0 donnée moteur).
# LUCIDITÉ : c'est un gate commit/CI, PAS un IDS/WAF runtime — ne remplace pas un pentest.

[security_forbidden]
# ── Universels, ACTIFS (quasi-zéro faux positif — un match = quasi certainement un secret commité) ──
-----BEGIN ([A-Z]+ )?PRIVATE KEY-----   | msg=clé privée en clair commitée — révoquer + déplacer vers un secret store
AKIA[0-9A-Z]{16}                        | msg=clé d'accès AWS en clair — révoquer immédiatement + secret store
# ── Per-stack (décommenter selon VOTRE stack) ────────────────────────────────
# password\s*=\s*["'][^"'$]{6,}["']                      | msg=mot de passe codé en dur — var d'env/secret store | exclude=(getenv|process\.env|Environment\.|GetValue)
# (SELECT|INSERT|UPDATE|DELETE)\b.*"\s*\+                 | msg=SQL concaténé (injection) — requête paramétrée  (.NET/Java/JS)
# pickle\.loads                                          | msg=désérialisation pickle non sûre (RCE) — format sûr  (Python)
# dangerouslySetInnerHTML                                | msg=injection HTML (XSS) — assainir l'entrée  (React)

[security_warn]
# ── Universels, ACTIFS (heuristiques — vérifier, ne bloque pas) ───────────────
\b(MD5|md5|Md5|SHA1|sha1|Sha1)\b                         | msg=hash faible — SHA-256+/bcrypt/argon2 pour un secret | exclude=(checksum|etag|cache.?key|content.?hash)
(api[_-]?key|secret|token|passwd)\s*[:=]\s*["'][^"']{8,}["']   | msg=secret potentiel en clair — variable d'env ? | exclude=(getenv|process\.env|Environment\.|example|placeholder|xxxx|changeme|your[_-])
[?&](id|user_?id|account_?id)=                           | msg=identifiant en query string — vérifier l'autorisation (risque IDOR)
# ── Per-stack (décommenter) ──────────────────────────────────────────────────
# verify\s*=\s*False                                     | msg=vérification TLS désactivée  (Python requests)
# InsecureSkipVerify\s*:\s*true                          | msg=vérification TLS désactivée  (Go)
# rejectUnauthorized\s*:\s*false                         | msg=vérification TLS désactivée  (Node)

# ─────────────────────────────────────────────────────────────────────────────
# Security Surface Trigger — DÉTECTION de surface sensible (RELAY Couche 2, ancrage sélectif).
# ⚠️ Sémantique DIFFÉRENTE des sections ci-dessus : ici les patterns ne sont PAS des dangers,
# ce sont des MARQUEURS de zone sensible (auth, secrets, crypto, IDOR…). Quand le diff stagé
# en touche un, relay-check (§9b) émet UN avertissement « ancrer SECURITY_RULES.md » — c'est
# le déclencheur qui rend l'ancrage sécu SÉLECTIF (chargé seulement si surface touchée → token-négatif).
# Sévérité = WARNING signal-only (n'altère jamais l'exit code) — heuristique, faux positifs assumés.
# Le champ msg= sert d'ÉTIQUETTE de catégorie (regroupée dans l'avertissement).
# Format : <regex ERE> | msg=<catégorie> | exclude=<regex contenu> | exclude-path=<fragment>
# Section absente/vide → trigger inactif, ANNONCÉ (jamais muet).

[security_surface]
# ── Universels, ACTIFS (marqueurs de surface sensible) ───────────────────────
[Aa]uthenticat|[Ll]ogin\b|[Ss]ign[_-]?in\b              | msg=authN (authentification)
[Aa]uthoriz|[Rr]ole[s]?\b|[Pp]ermission                 | msg=authZ (autorisation / IDOR)
[Pp]assword|[Ss]ecret|[Tt]oken|[Aa]pi[_-]?key           | msg=secrets / identité
[Cc]rypt|[Cc]ipher|\b[Jj]wt\b|\b[Hh]ash\b               | msg=crypto
# ── Per-stack (décommenter selon VOTRE stack) ────────────────────────────────
# \b(SELECT|INSERT|UPDATE|DELETE)\b                      | msg=accès données (injection / IDOR)
# \[Authorize                                            | msg=authZ .NET  (vérifier rôles + filtre tenant)
# @PreAuthorize|@Secured                                 | msg=authZ Java/Spring
# (UploadedFile|MultipartFile|req\.files|request\.files) | msg=upload de fichier
# (pickle\.loads|yaml\.load\b|Marshal\.load|unserialize) | msg=désérialisation
# \b(exec|eval)\s*\(                                     | msg=exécution dynamique de code
