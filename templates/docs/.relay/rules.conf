# RELAY — règles d'instance du Regression Shield
# ─────────────────────────────────────────────────────────────────────────────
# Fichier d'INSTANCE : versionné (committé), JAMAIS écrasé par relay-update.
# Déclarez ici les patterns que CE projet ne doit jamais réintroduire dans un diff.
#
# Format :
#   • Une regex (ERE, telle que `grep -E`) par ligne, sous [forbidden_patterns].
#   • Exclusion optionnelle inline :  <regex> | exclude=<regex-d-exclusion>
#     (la ligne stagée correspondant à l'exclusion n'est PAS comptée comme violation).
#   • Lignes vides et lignes commençant par « # » : ignorées.
#
# Tant qu'aucun pattern n'est déclaré (section vide), le Regression Shield reste
# INACTIF et relay-check l'annonce par un avertissement explicite à chaque commit.
# Adaptez les exemples ci-dessous à VOTRE stack, puis décommentez-les.

[forbidden_patterns]
# ── Exemples (décommenter + adapter) ────────────────────────────────────────
# \.Result\b              | exclude=\.Result[[:space:]]*=   # .NET : .Result bloquant (deadlock async), sauf l'affectation MVC `context.Result = ...`
# \.Wait\(\)                                                # .NET : .Wait() bloquant
# localhost:[0-9]+                                          # URL/port codé en dur
# console\.log                                              # JS/TS : log de debug oublié
# TODO|FIXME                                                # marqueurs à ne pas committer

# ─────────────────────────────────────────────────────────────────────────────
# Design System Shield (sévérité WARNING — ne bloque pas le commit).
# Vérifie que les fichiers stagés utilisent le design system du projet plutôt que
# des valeurs codées en dur. Sections par type de fichier :
#   • [design_warn_flutter] → fichiers .dart
#   • [design_warn_css]     → fichiers .css / .cshtml
# Format : <regex> | msg=<texte de remédiation> | exclude-path=<fragment-de-chemin>
#   (msg & exclude-path optionnels ; exclude-path = fichiers dont le chemin contient
#    ce fragment sont ignorés, p.ex. l'emplacement où le design system est DÉFINI).
# Section absente/vide → shield DS inactif pour ce type (annoncé, jamais muet).

[design_warn_flutter]
# ── Exemples (décommenter + adapter à VOTRE design system) ───────────────────
# Colors\.green\b   | msg=utiliser AppColors.* à la place | exclude-path=core/theme/
# Colors\.red\b     | msg=utiliser AppColors.* à la place | exclude-path=core/theme/

[design_warn_css]
# ── Exemple (décommenter + adapter) ─────────────────────────────────────────
# (color|background|border)[^:]*:[^;]*#[0-9a-fA-F]{3,6}   | msg=couleur hex hardcodée — utiliser var(--ac-*) | exclude-path=design-system
